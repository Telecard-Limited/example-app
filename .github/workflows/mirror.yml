name: Auto-Mirror to Target Account
on:
  push:
    branches: ["**"]
  create:
  delete:
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror push to Target Org
        run: |
          git remote add mirror https://x-access-token:${{ secrets.TARGET_TOKEN }}@github.com/Telecard-Limited-Mirror/example-app.git
          git push --mirror mirror
